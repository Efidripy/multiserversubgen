name: Deploy To Server

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            if [ ! -d /opt/multiserversubgen ]; then
              git clone https://github.com/${{ github.repository }} /opt/multiserversubgen
            fi
            cd /opt/multiserversubgen
            git fetch --all
            git checkout ${{ inputs.branch }}
            git pull --ff-only origin ${{ inputs.branch }}
            chmod +x scripts/deploy/server-deploy.sh
            sudo REPO_DIR=/opt/multiserversubgen bash scripts/deploy/server-deploy.sh
