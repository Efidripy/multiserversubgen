mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxies: []
proxy-groups:
  - name: default
    type: select
    proxies:
      - DIRECT

rules:
  - DOMAIN,${DOMAIN},DIRECT
  - MATCH,DIRECT

